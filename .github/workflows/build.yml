name: Build and Release Draftwell

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  GNOME_RUNTIME_VERSION: '50'

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install npm dependencies
        run: npm ci

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run JavaScript tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: npm run build

      - name: Check Rust compilation
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  linux-x86_64:
    name: Linux x86_64 (deb/rpm/AppImage)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: [check]
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev rpm

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build deb and rpm
        run: npm run tauri:build -- --bundles deb,rpm --ci

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-linux-x86_64-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-linux-x86_64-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Build AppImage
        run: npm run tauri:build -- --bundles appimage --ci

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-linux-x86_64-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  linux-arm64:
    name: Linux ARM64 (deb)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04-arm
    needs: [check]
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build deb
        run: npm run tauri:build -- --bundles deb --ci

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-linux-arm64-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  flatpak:
    name: Linux Flatpak
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: [check]
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak flatpak-builder \
            libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build native application binary
        run: npm run tauri:build -- --no-bundle --ci

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME runtime and SDK
        run: |
          flatpak install --user --noninteractive flathub \
            org.gnome.Platform//${{ env.GNOME_RUNTIME_VERSION }} \
            org.gnome.Sdk//${{ env.GNOME_RUNTIME_VERSION }}

      - name: Build Flatpak repository
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            flatpak/com.draftwell.editor.yml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            draftwell.flatpak \
            com.draftwell.editor \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-linux-x86_64-flatpak
          path: draftwell.flatpak
          if-no-files-found: error

  macos-arm64:
    name: macOS Apple Silicon (dmg)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    needs: [check]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm ci

      - name: Build dmg
        run: npm run tauri:build -- --target aarch64-apple-darwin --bundles dmg --ci

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-macos-arm64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  macos-universal:
    name: macOS Universal (dmg)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    needs: [check]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install npm dependencies
        run: npm ci

      - name: Build universal dmg
        run: npm run tauri:build -- --target universal-apple-darwin --bundles dmg --ci

      - name: Upload universal dmg
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-macos-universal-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows-x86_64:
    name: Windows x86_64 (msi)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2025
    needs: [check]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm ci

      - name: Build msi
        run: npm run tauri:build -- --bundles msi --ci

      - name: Upload msi
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-windows-x86_64-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  windows-arm64:
    name: Windows ARM64 (msi)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-11-arm
    needs: [check]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm ci

      - name: Build msi
        run: npm run tauri:build -- --target aarch64-pc-windows-msvc --bundles msi --ci

      - name: Upload msi
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-windows-arm64-msi
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

  checksums:
    name: Generate Checksums
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs:
      - linux-x86_64
      - linux-arm64
      - flatpak
      - macos-arm64
      - macos-universal
      - windows-x86_64
      - windows-arm64
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: draftwell-*
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        working-directory: artifacts
        shell: bash
        run: |
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS
          test -s SHA256SUMS
          cat SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: draftwell-checksums
          path: artifacts/SHA256SUMS
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: [checksums]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: draftwell-*
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Draftwell ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-artifacts/*
          fail_on_unmatched_files: true
