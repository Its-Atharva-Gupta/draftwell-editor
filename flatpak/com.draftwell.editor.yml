id: com.draftwell.editor
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: draftwell

finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --filesystem=host

modules:
  - name: draftwell
    buildsystem: simple
    build-commands:
      - install -Dm755 draftwell /app/bin/draftwell
      - install -Dm644 com.draftwell.editor.desktop /app/share/applications/com.draftwell.editor.desktop
      - install -Dm644 com.draftwell.editor.metainfo.xml /app/share/metainfo/com.draftwell.editor.metainfo.xml
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.draftwell.editor.png
      - install -Dm644 draftwell.svg /app/share/icons/hicolor/scalable/apps/com.draftwell.editor.svg
    sources:
      - type: file
        path: ../src-tauri/target/release/draftwell
      - type: file
        path: com.draftwell.editor.desktop
      - type: file
        path: com.draftwell.editor.metainfo.xml
      - type: file
        path: ../src-tauri/icons/icon.png
        dest-filename: icon.png
      - type: file
        path: ../src-tauri/icons/draftwell.svg
